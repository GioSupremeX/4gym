name: Build and Deploy Vite Project

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm' # This will look at the root lockfile successfully now

      # 1. Installs your packages from the root folder
      - name: Install dependencies
        run: npm ci

      # 2. Compiles your Vite app 
      - name: Build project
        run: npm run build

      # 3. Creates the CNAME file inside the compiled output directory
      - name: Add CNAME file
        run: echo "4gymrhodes.qzz.io" > ./dist/CNAME

      # 4. Prepares GitHub Pages environmental configurations
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # 5. Uploads the correct distribution path where your compiled code ends up
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      # 6. Pushes the static site live
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
